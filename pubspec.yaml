name: recovery_management
description: Recovery Management System - Loan Recovery App for Banks & NBFCs
version: 1.0.0+1
publish_to: 'none'

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^2.24.2
  firebase_auth: ^4.16.0
  cloud_firestore: ^4.14.0
  firebase_storage: ^11.6.0

  # State Management
  provider: ^6.1.1
  flutter_riverpod: ^2.4.9

  # Excel / CSV
  excel: ^4.0.2
  csv: ^6.0.0
  file_picker: ^6.1.1

  # UI
  fl_chart: ^0.66.2
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.0
  shimmer: ^3.0.0
  animated_bottom_navigation_bar: ^1.3.3

  # Utilities
  intl: ^0.19.0
  shared_preferences: ^2.2.2
  hive_flutter: ^1.1.0
  connectivity_plus: ^5.0.2
  permission_handler: ^11.1.0
  geolocator: ^10.1.0
  image_picker: ^1.0.7
  path_provider: ^2.1.2
  open_file: ^3.3.2
  url_launcher: ^6.2.2
  package_info_plus: ^5.0.1
  local_auth: ^2.1.8
  flutter_local_notifications: ^16.3.0
  uuid: ^4.3.3
  logger: ^2.0.2+1
  dio: ^5.4.0

  # AdMob for monetization
  google_mobile_ads: ^4.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  hive_generator: ^2.0.1
  build_runner: ^2.4.7
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.3.10

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/app_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#4F5F9F"
  adaptive_icon_foreground: "assets/icons/app_icon_fg.png"

flutter_native_splash:
  color: "#4F5F9F"
  image: assets/images/splash_logo.png
  android: true
  ios: true

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/sample/
